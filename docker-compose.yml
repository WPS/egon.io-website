version: "3.9"

services:
  site:
    build:
      context: .
      args:
        RUBY_VERSION: ${RUBY_VERSION}
    image: wps/egon.io-website:latest
    command: bundle exec jekyll serve --trace --host 0.0.0.0 --watch --incremental
    environment:
      - JEKYLL_ENV=development
    volumes:
      - ./:/srv/jekyll
    ports:
      - 4000:4000

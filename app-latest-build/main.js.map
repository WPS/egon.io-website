<mat-dialog-content>
  <h1>{{ title }}</h1>
  <div class="row">
    <mat-form-field class="dialogWidth" color="accent">
      <mat-label>Filename</mat-label>
      <input
        matInput
        type="text"
        [placeholder]="defaultFileName"
        (change)="updateFileName($event)"
      />
    </mat-form-field>
  </div>
  <mat-label>Image Export Options</mat-label>
  <br />
  <div class="row">
    <mat-checkbox
      [checked]="withTitle()"
      (change)="updateWithTitle($event.checked)"
    >
      Add title and description to image
    </mat-checkbox>
  </div>
  <div class="row">
    <mat-checkbox
      [checked]="useWhiteBackground()"
      (change)="updateUseWhiteBackground($event.checked)"
    >
      Add white background to SVG (default: transparent)
    </mat-checkbox>
  </div>
  <div class="row">
    <mat-checkbox
      [checked]="isAnimatedSvgExport()"
      (change)="onExportAnimatedSvg($event.checked)"
    >
      Animated SVG
      @if (isAnimatedSvgExport()) {
        <span> - animation speed:</span>
        <input
          class="number-input"
          [(ngModel)]="animationSpeed"
          [max]="9"
          [min]="1"
          [maxLength]="1"
          oninput="this.value = this.value.replace(/[^1-9]/g, '')"
        />
        <span (click)="onExportAnimatedSvg(!isAnimatedSvgExport())"
          >seconds</span
        >
      }
    </mat-checkbox>
  </div>
</mat-dialog-content>
<br />
<br />
<mat-dialog-actions>
  <div>
    <button type="button" mat-flat-button (click)="close()">Cancel</button>
    @for (option of options; track option; let i = $index) {
      <button
        type="button"
        mat-stroked-button
        class="mr-1"
        [title]="option.tooltip"
        (click)="doOption(i)"
      >
        {{ option.text }}
      </button>
    }
  </div>
</mat-dialog-actions>
